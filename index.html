<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contest Rankings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f2f2f2;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Contest Final Rankings</h1>
        <p>Contest Name: MATH2020_GRAPH</p>
        <p id="date">Date: 28/12/2023 </p>
        <p>(Rank is updated 2 times everyday, at 0h00 and 11h59)</p>
    </header>

    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Participant Name</th>
                <th>Running Time</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody>
            <!-- Example row, duplicate for each participant -->
            <tr>
                <td>1</td>
                <td>Group X</td>
                <td>Time</td>
                <td>Score</td>
            </tr>
            <!-- Add more rows for other participants -->
        </tbody>
    </table>

    <div class="footer">
        <p>Thank you for participating in the contest!</p>
    </div>
<script>
const d = new Date();
document.getElementById("date").innerHTML = d;
</script>
</body>
</html>
